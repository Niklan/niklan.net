$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Chip
status: experimental
group: ui
props:
  type: object
  required:
    - label
  properties:
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Attributes
    href:
      title: URL
      type: ['null', string]
    label:
      title: Label
      type: string
    icon:
      title: Icon name
      type: ['null', string]
    icon_pack:
      title: Icon pack (defaults to laszlo)
      type: string
      default: laszlo
    suffix:
      title: Suffix text
      type: ['null', string]
    variant:
      title: Variant
      type: string
      enum:
        - filled
      default: filled
    color:
      title: Color
      type: string
      enum:
        - default
      default: default
    size:
      title: Size
      type: string
      enum:
        - medium
      default: medium
